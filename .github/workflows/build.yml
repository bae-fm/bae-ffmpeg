name: Build FFmpeg

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  FFMPEG_VERSION: "8.1.2"

jobs:
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x86_64
            runner: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        # nasm only: FFmpeg's x86 asm and lame's asm need it. lame and opus are
        # built from source as static libs inside build-macos.sh so the artifact
        # bundles them and imports no Homebrew dylib.
        run: brew install nasm

      - name: Build FFmpeg
        run: ./build-macos.sh ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-macos-${{ matrix.arch }}
          path: dist/ffmpeg-macos-${{ matrix.arch }}.tar.gz

  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3

      - name: Build FFmpeg
        run: ./build-linux.sh ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-${{ matrix.arch }}
          path: dist/ffmpeg-linux-${{ matrix.arch }}.tar.gz

  build-windows:
    name: Build Windows (${{ matrix.arch }})
    # Both arches cross-compiled on Linux with llvm-mingw, deps bundled static, so
    # each artifact is self-contained -- no MSYS2 runtime DLLs for the consumer to
    # provision. No Windows runner needed.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nasm
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Build FFmpeg
        run: ./build-windows.sh ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-windows-${{ matrix.arch }}
          path: dist/ffmpeg-windows-${{ matrix.arch }}.zip

  build-ios:
    name: Build iOS (device + simulator)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build FFmpeg
        run: ./build-ios.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-ios
          path: dist/ffmpeg-ios*.tar.gz

  build-android:
    name: Build Android (arm64 + x86_64)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build FFmpeg
        run: ANDROID_NDK_HOME="$ANDROID_NDK_LATEST_HOME" ./build-android.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-android
          path: dist/ffmpeg-android-*.tar.gz

  release:
    name: Create Release
    needs: [build-macos, build-linux, build-windows, build-ios, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true

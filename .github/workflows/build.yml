name: Build FFmpeg

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  FFMPEG_VERSION: "8.1.2"

jobs:
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x86_64
            runner: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install nasm lame opus

      - name: Build FFmpeg
        run: ./build-macos.sh ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-macos-${{ matrix.arch }}
          path: dist/ffmpeg-macos-${{ matrix.arch }}.tar.gz

  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3

      - name: Build FFmpeg
        run: ./build-linux.sh ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-${{ matrix.arch }}
          path: dist/ffmpeg-linux-${{ matrix.arch }}.tar.gz

  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-lame
            mingw-w64-x86_64-opus
            make
            diffutils
            zip

      - name: Build FFmpeg
        shell: msys2 {0}
        run: ./build-windows.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-windows-x86_64
          path: dist/ffmpeg-windows-x86_64.zip

  build-windows-arm64:
    name: Build Windows (aarch64)
    # Cross-compiled on Linux with llvm-mingw (classic mingw-w64 has no usable
    # aarch64 target). Deps are bundled static, so the artifact is self-contained
    # -- unlike the x86_64 build, whose mingw runtime DLLs the consumer supplies
    # from MSYS2.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build FFmpeg
        run: ./build-windows-arm64.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-windows-aarch64
          path: dist/ffmpeg-windows-aarch64.zip

  build-ios:
    name: Build iOS (device + simulator)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build FFmpeg
        run: ./build-ios.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-ios
          path: dist/ffmpeg-ios*.tar.gz

  build-android:
    name: Build Android (arm64 + x86_64)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build FFmpeg
        run: ANDROID_NDK_HOME="$ANDROID_NDK_LATEST_HOME" ./build-android.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-android
          path: dist/ffmpeg-android-*.tar.gz

  release:
    name: Create Release
    needs: [build-macos, build-linux, build-windows, build-windows-arm64, build-ios, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
